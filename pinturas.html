    <link rel="stylesheet" type="text/css" href="estilo.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { display: flex; background-color: #f4f1ea; color: #333; }

        /* Menú Lateral */
        nav {
            width: 250px;
            height: 100vh;
            background-color: #2c1e16;
            color: white;
            position: fixed;
            padding-top: 20px;
        }

        nav h2 { text-align: center; margin-bottom: 30px; color: #d4a373; }

        nav a {
            display: block;
            padding: 15px 25px;
            color: #f0e6d2;
            text-decoration: none;
            transition: 0.3s;
            border-bottom: 1px solid #3d2b1f;
        }

        nav a:hover { background-color: #de5119; color: #2c1e16; }

        /* Contenedor Principal */
        main {
            margin-left: 250px;
            padding: 40px;
            width: 100%;
        }

        section { display: none; margin-bottom: 50px; line-height: 1.6; }
        section:target { display: block; } /* Muestra la sección según el ID en la URL */
        #inicio { display: block; } /* Mostrar inicio por defecto */

        h1 { color: #5d4037; border-bottom: 2px solid #d4a373; padding-bottom: 10px; margin-bottom: 20px; }
        h3 { margin-top: 20px; color: #8d6e63; }

        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 20px; }
        
        /* Simulación de Mapa */
        .map-placeholder {
            width: 100%;
            height: 400px;
            background-color: #e0d5c1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #8d6e63;
            border-radius: 10px;
        }

        .grid-sitios { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .sitio-item { background: #8d6e63; color: white; padding: 15px; border-radius: 5px; text-align: center; }
    </style>
</head>

    <style>
  /* Contenedor principal que usa CSS Grid */
  .album-container {
    display: grid;
    /* Crea columnas automáticas de mínimo 250px */
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px; /* Espacio entre las fotos */
    padding: 5px;
  }

  /* Estilo de cada cuadro de foto */
  .foto {
    overflow: hidden; /* Corta lo que sobresalga al hacer zoom */
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }

  /* Estilo de la imagen */
  .foto img {
    width: 100%;
    height: 200px; /* Altura fija para que todas sean iguales */
    
    display: block;
    transition: transform 0.3s ease; /* Suavidad para el efecto hover */
  }

  
</style>
