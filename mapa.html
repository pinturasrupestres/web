<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arte Rupestre - Mapa de Pinos</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Reset General */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            display: flex; 
            flex-direction: row; 
            background-color: #f4f1ea; 
            color: #333; 
            min-height: 100vh;
        }

        /* --- MENÚ LATERAL (Escritorio) --- */
        nav {
            width: 250px;
            background-color: #2c1e16;
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 1000;
        }

        nav h2 { text-align: center; padding: 20px 0; color: #d4a373; border-bottom: 1px solid #3d2b1f; }

        .menu-links { display: flex; flex-direction: column; }

        nav a {
            display: block;
            padding: 15px 25px;
            color: #f0e6d2;
            text-decoration: none;
            transition: 0.3s;
            border-bottom: 1px solid #3d2b1f;
        }

        nav a:hover { background-color: #de5119; color: white; }

        /* --- CONTENIDO PRINCIPAL --- */
        main {
            margin-left: 250px; 
            padding: 40px;
            width: 100%;
            min-height: 100vh;
        }

        section { line-height: 1.6; max-width: 1000px; margin: 0 auto; }

        h1 { color: #5d4037; border-bottom: 2px solid #d4a373; padding-bottom: 10px; margin-bottom: 20px; text-align: center; }

        /* --- ESTILO DEL MAPA --- */
        #map {
            height: 500px;
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 2px solid #d4a373;
            z-index: 1; /* Para que no se encime al menú móvil */
        }

        /* --- RESPONSIVIDAD (MÓVIL) --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }

            nav {
                width: 100%;
                height: auto;
                position: relative;
                padding: 10px 0;
            }

            nav h2 { padding: 5px; font-size: 1.2rem; border-bottom: none; }

            .menu-links {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 4px;
                padding: 0 8px;
            }

            nav a {
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 6px 2px;
                font-size: 11px;
                border: 1px solid #4a3428;
                border-radius: 4px;
                background-color: #3d2b1f;
                height: 40px;
            }

            main {
                margin-left: 0;
                padding: 15px;
            }

            #map {
                height: 400px; /* Un poco más pequeño en celular */
            }

            h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <nav>
        <h2>Menú</h2>
        <div class="menu-links">
            <a href="index.html">Inicio</a>
            <a href="historia.html">Historia</a>
            <a href="mapa.html">Mapa</a>
            <a href="sitios.html">Sitios</a>
            <a href="pigmentos.html">Pigmentos</a>
            <a href="pinturas.html">Pinturas rupestres (Experimentales)</a>
        </div>
    </nav>

    <main>
        <section>
            <h1>Mapa de Ubicaciones en Pinos, Zacatecas</h1>
            <div id="map"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Inicializar el mapa
        var map = L.map('map').setView([22.2965, -101.5750], 11); 

        // 2. Añadir capa de mapa
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 3. Ubicaciones
        var ubicaciones = [
            {
                nombre: "Cabecera Municipal de Pinos",
                coords: [22.2965, -101.5750],
                info: "Pueblo Mágico de Pinos",
                imagen: "pinos.jpg"
            },
            {
                nombre: "Jaltomate",
                coords: [22.1650, -101.7805],
                info: "Localidad de Jaltomate, Pinos",
                imagen: "jaltomate.jpeg"
            },
            {
                nombre: "San Martín",
                coords: [22.2242, -101.3750],
                info: "Localidad de San Martín",
                imagen: "sanmartin.jpeg"
            },
            {
                nombre: "El Cerrito",
                coords: [21.9890, -101.4270],
                info: "Localidad del Cerrito, Pinos",
                imagen: "elcerrito.jpeg"
            }
        ];

        // 4. Ciclo para agregar marcadores
        ubicaciones.forEach(function(lugar) {
            var contenido = `
                <div style="text-align:center; width: 150px;">
                    <b style="color:#2c1e16;">${lugar.nombre}</b><br>
                    <span style="font-size:12px;">${lugar.info}</span><br>
                    <img src="${lugar.imagen}" alt="Foto" style="width:100%; margin-top:8px; border-radius:5px; border: 1px solid #d4a373;">
                </div>
            `;

            L.marker(lugar.coords)
                .addTo(map)
                .bindPopup(contenido);
        });

        // Corregir tamaño del mapa al cargar en móviles
        setTimeout(function(){ map.invalidateSize();}, 400);
    </script>

</body>
</html>
